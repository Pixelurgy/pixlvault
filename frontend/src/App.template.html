<v-app>
  <div class="app-viewport">
    <div class="file-manager">
      <div
        class="sidebar-shell"
        :class="{ open: sidebarVisible }"
        v-show="sidebarVisible || !isMobile"
      >
        <SideBar
          ref="sidebarRef"
          :collapsed="!sidebarVisible && !isMobile"
          :selectedCharacter="selectedCharacter"
          :allPicturesId="ALL_PICTURES_ID"
          :unassignedPicturesId="UNASSIGNED_PICTURES_ID"
          :selectedSet="selectedSet"
          :selectedSort="selectedSort"
          :selectedDescending="selectedDescending"
          :backendUrl="BACKEND_URL"
          :selectedSimilarityCharacter="selectedSimilarityCharacter"
          :stackThreshold="stackThreshold"
          @select-character="handleSelectCharacter"
          @select-set="handleSelectSet"
          @images-assigned-to-character="handleImagesAssignedToCharacter"
          @faces-assigned-to-character="handleFacesAssignedToCharacter"
          @toggle-sidebar="sidebarVisible = !sidebarVisible"
          @update:selected-sort="handleUpdateSelectedSort"
          @update:similarity-character="handleUpdateSimilarityCharacter"
          @update:stack-threshold="handleUpdateStackThreshold"
          @update:set-error="error = $event"
          @update:set-loading="loading = $event"
        />
      </div>
      <div
        v-if="sidebarVisible && isMobile"
        class="sidebar-backdrop"
        @click="sidebarVisible = false"
      ></div>
      <main class="main-area">
        <div class="top-toolbar">
          <div class="toolbar-actions">
            <div class="toolbar-size-controls">
              <v-btn
                icon
                :color="searchOverlayVisible ? 'primary' : 'rgba(var(--v-theme-surface), 0.3)'"
                @click="openSearchOverlay"
                title="Search"
                style="margin-left: 4px; border-radius: 8px"
              >
                <v-icon>mdi-magnify</v-icon>
              </v-btn>

              <v-menu
                offset-y
                :close-on-content-click="false"
                transition="scale-transition"
              >
                <template #activator="{ props }">
                  <v-btn
                    icon
                    v-bind="props"
                    :color="searchOverlayVisible ? 'primary' : 'rgba(var(--v-theme-surface), 0.1)'"
                    title="Set grid columns"
                    style="margin-left: 4px; border-radius: 8px"
                  >
                    <v-icon>mdi-view-grid</v-icon>
                  </v-btn>
                </template>
                <div
                  style="
                    padding: 8px 8px;
                    min-width: 200px;
                    background: rgba(var(--v-theme-background), 0.9);
                    border-radius: 8px;
                    box-shadow: 2px 2px 12px rgba(0, 0, 0, 0.4);
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    min-height: 56px;
                    justify-content: center;
                  "
                >
                  <span
                    style="
                      font-size: 1.08em;
                      margin-bottom: 6px;
                      color: rgb(var(--v-theme-on-background));
                      font-weight: 500;
                      letter-spacing: 0.02em;
                    "
                    >Columns: {{ columns }}</span
                  >
                  <v-slider
                    v-model="columns"
                    :min="2"
                    :max="10"
                    :step="1"
                    vertical
                    style="height: 40px; width: 80%; margin-bottom: 0"
                    hide-details
                    track-color="#888"
                    thumb-color="primary"
                  />
                </div>
              </v-menu>
            </div>
            <v-btn
              icon
              :color="showStars ? 'accent' : 'rgba(var(--v-theme-surface), 0.3)'"
              @click="showStars = !showStars"
              title="Toggle star ratings"
              style="margin-left: 4px; border-radius: 8px"
            >
              <v-icon :color="showStars ? 'white' : undefined"
                >{{ showStars ? "mdi-star" : "mdi-star-outline" }}</v-icon
              >
            </v-btn>
            <v-btn
              icon
              :color="showFaceBboxes ? 'primary' : 'surface'"
              @click="showFaceBboxes = !showFaceBboxes"
              title="Toggle face bounding boxes"
              class="face-bbox-toggle-btn"
              style="margin-left: 4px"
            >
              <span class="face-bbox-icon-wrapper">
                <v-icon
                  >{{ showFaceBboxes ? 'mdi-account' : 'mdi-account-outline'
                  }}</v-icon
                >
              </span>
            </v-btn>
            <v-btn-toggle
              v-model="mediaTypeFilter"
              mandatory
              class="media-type-toggle"
              dense
            >
              <v-btn value="all" title="Show all media">
                <v-icon>mdi-image-multiple</v-icon>
              </v-btn>
              <v-btn value="images" title="Show images only">
                <v-icon>mdi-image</v-icon>
              </v-btn>
              <v-btn value="videos" title="Show videos only">
                <v-icon>mdi-video</v-icon>
              </v-btn>
            </v-btn-toggle>
            <v-btn
              icon
              :color="'surface'"
              @click="handleExportZip"
              title="Export current grid to zip"
              class="toolbar-download-btn"
              style="margin-left: 4px"
            >
              <v-icon :color="'onSurface'">mdi-download</v-icon>
            </v-btn>
          </div>
        </div>
        <div
          :class="['main-content', selectedCharacter ? 'accent-border' : '']"
          style="margin-top: 0; padding-top: 0"
        >
          <ImageGrid
            ref="gridContainer"
            :thumbnailSize="thumbnailSize"
            :sidebarVisible="sidebarVisible"
            :backendUrl="BACKEND_URL"
            :selectedCharacter="selectedCharacter"
            :selectedSet="selectedSet"
            :searchQuery="searchQuery"
            :selectedSort="selectedSort"
            :selectedDescending="selectedDescending"
            :similarityCharacter="selectedSimilarityCharacter"
            :stackThreshold="stackThreshold"
            :showStars="showStars"
            :gridVersion="gridVersion"
            :mediaTypeFilter="mediaTypeFilter"
            :showFaceBboxes="showFaceBboxes"
            :allPicturesId="ALL_PICTURES_ID"
            :unassignedPicturesId="UNASSIGNED_PICTURES_ID"
            :columns="columns"
            @clear-search="handleClearSearch"
            @refresh-sidebar="refreshSidebar"
            @reset-to-all="handleResetToAll"
          />
        </div>
      </main>
    </div>
    <SearchOverlay
      v-if="searchOverlayVisible"
      :modelValue="searchQuery"
      @search="handleUpdateSearchQuery"
      @close="closeSearchOverlay"
    />
    <v-dialog v-model="exportDialog" max-width="420">
      <div class="export-dialog-shell">
        <v-btn
          icon
          size="36px"
          class="export-dialog-close"
          @click="cancelExportZip"
        >
          <v-icon size="24px">mdi-close</v-icon>
        </v-btn>
        <v-card class="export-dialog-card">
          <v-card-title class="export-dialog-header" :color="'onSurface'">
            <span>Export Pictures</span>
          </v-card-title>
          <v-card-text>
            <v-select
              v-model="exportCaptionMode"
              :background-color="'surface'"
              :color="'onSurface'"
              :items="exportCaptionOptions"
              item-title="title"
              item-value="value"
              label="Captions"
              density="comfortable"
            />
            <v-switch
              v-model="exportIncludeCharacterName"
              label="Include character name"
              color="primary"
              density="comfortable"
              :disabled="exportCaptionMode === 'none'"
            />
          </v-card-text>
          <v-card-actions>
            <v-spacer></v-spacer>
            <v-btn class="export-btn-cancel" @click="cancelExportZip">
              Cancel
            </v-btn>
            <v-btn class="export-btn-confirm" @click="confirmExportZip">
              Export
            </v-btn>
          </v-card-actions>
        </v-card>
      </div>
    </v-dialog>
  </div>
</v-app>
