services:
  pixlstash:
    build:
      context: .
      dockerfile: Dockerfile
    image: pixlstash:latest
    container_name: pixlstash
    restart: unless-stopped

    # GPU access via nvidia-container-runtime.
    # Requires: sudo nvidia-ctk runtime configure --runtime=docker && sudo systemctl restart docker
    runtime: nvidia

    ports:
      - "9537:9537"

    volumes:
      # All persistent data (config, images/database, downloaded AI models) lives
      # under the container user's home directory, mirroring a regular Linux install:
      #   ~/.config/pixlstash/server-config.json
      #   ~/.config/pixlstash/images/  ← default image root + vault.db
      #   ~/.local/share/pixlstash/downloaded_models/
      #
      # To store images on your real filesystem instead, add a bind mount and set
      # PIXLSTASH_IMAGE_ROOT (see .env.example).
      - pixlstash-home:/home/pixlstash

    environment:
      PIXLSTASH_HOST: "0.0.0.0"
      PIXLSTASH_PORT: "9537"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      # Optional: uncomment + add a bind mount to put images on your real filesystem
      # PIXLSTASH_IMAGE_ROOT: "/mnt/photos"

volumes:
  pixlstash-home:
