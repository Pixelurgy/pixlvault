name: Publish PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend bundle
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Validate tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import pathlib
          import sys
          try:
              import tomllib
          except ImportError:
              import tomli as tomllib

          pyproject = pathlib.Path('pyproject.toml')
          data = tomllib.loads(pyproject.read_text(encoding='utf-8'))
          version = data['project']['version']

          tag = '${{ github.ref_name }}'
          expected = f'v{version}'
          if tag != expected:
              print(f'::error::Tag {tag} does not match project version {expected}')
              sys.exit(1)

          print(f'Tag/version check passed: {tag}')
          PY

      - name: Build Python distributions
        run: python -m build

      - name: Verify wheel includes Alembic assets
        run: |
          python - <<'PY'
          import glob
          import pathlib
          import sys
          import zipfile

          wheel_paths = sorted(glob.glob('dist/pixlvault-*.whl'))
          if not wheel_paths:
            print('No wheel found in dist/.')
            sys.exit(1)

          wheel = pathlib.Path(wheel_paths[-1])
          required = [
            'pixlvault/alembic.ini',
            'pixlvault/migrations/env.py',
            'pixlvault/migrations/script.py.mako',
            'pixlvault/migrations/versions/0001_baseline.py',
          ]

          with zipfile.ZipFile(wheel) as archive:
            names = set(archive.namelist())

          missing = [name for name in required if name not in names]
          if missing:
            print('Missing required files in wheel:')
            for name in missing:
              print(f' - {name}')
            sys.exit(1)

          print(f'Wheel Alembic asset check passed: {wheel}')
          PY

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
